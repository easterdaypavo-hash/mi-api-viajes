<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Travel Finder Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { background:#003580; color:white; padding:20px; font-size:22px; }
.registro { background:white; padding:20px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center; border-bottom:2px solid #ddd; }
.search-container { background:#febb02; padding:20px; display:flex; gap:10px; flex-wrap:wrap; }
.results { padding:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:15px; }
.card { background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.2); }
.card img { width:100%; height:180px; object-fit:cover; }
.card-content { padding:15px; }
#map { height:400px; margin:20px; }
input, select, button { padding:8px; border-radius:5px; border:1px solid #ccc; }
button { background:#003580; color:white; cursor:pointer; }
button:hover { background:#002050; }

.coincidencia {
  display: inline-block;
  margin: 10px 0;
  padding: 6px 10px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
}

.coincidencia.alta {
  background: #d4edda;
  color: #155724;
}

.coincidencia.media {
  background: #fff3cd;
  color: #856404;
}

.coincidencia.baja {
  background: #f8d7da;
  color: #721c24;
}
</style>
</head>

<body>

<header>🌍 Travel Finder Pro</header>

<div class="registro">
  <h3>Registro</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="registrar()">Registrarse</button>
</div>

<div class="search-container">
  <input type="number" id="presupuesto" placeholder="Presupuesto">
  <select id="tipo_viaje">
    <option value="aventura">Aventura</option>
    <option value="playa">Playa</option>
    <option value="cultural">Cultural</option>
    <option value="romantico">Romántico</option>
  </select>
  <input type="text" id="mes" placeholder="Mes">
  <select id="continente">
    <option value="">Todos</option>
    <option value="Europa">Europa</option>
    <option value="América">América</option>
    <option value="Asia">Asia</option>
  </select>
  <button onclick="recomendar()">Buscar</button>
</div>

<div id="map"></div>
<div id="results" class="results"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([20,0],2);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'&copy; OpenStreetMap' }).addTo(map);

// REGISTRO USUARIO
async function registrar(){
  try {
    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/registro", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({nombre,email,password})
    });

    const data = await response.json();
    console.log("Registro:", data);

    alert(data.mensaje || data.error || "Respuesta recibida");
  } catch (error) {
    console.error("Error en registro:", error);
    alert("Error en el registro");
  }
}

// RECOMENDADOR
async function recomendar(){
  try {
    const presupuesto = parseInt(document.getElementById("presupuesto").value);
    const tipo_viaje = document.getElementById("tipo_viaje").value;
    const mes = document.getElementById("mes").value;
    const continente = document.getElementById("continente").value;

    const response = await fetch("/recomendar", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({presupuesto,tipo_viaje,mes,continente})
    });

    const data = await response.json();
    console.log("Recomendaciones:", data);

    document.getElementById("results").innerHTML="";

    // Limpiar marcadores del mapa
    map.eachLayer(layer=>{
      if(layer instanceof L.Marker){
        map.removeLayer(layer);
      }
    });

    if(!data.recomendaciones || data.recomendaciones.length === 0){
      alert("No se encontraron destinos");
      return;
    }

    data.recomendaciones.forEach(destino=>{
      document.getElementById("results").innerHTML += `
        <div class="card">
          <img src="${destino.imagen}">
          <div class="card-content">
            <h3>${destino.ciudad}, ${destino.pais}</h3>
            <div class="coincidencia ${destino.nivel_coincidencia.toLowerCase()}">
              Coincidencia: ${destino.coincidencia}% · ${destino.nivel_coincidencia}
            </div>
            <p>${destino.descripcion}</p>
            <p>🌍 ${destino.continente}</p>
            <p>✈ Aeropuerto: ${destino.aeropuerto}</p>
            <p>⏱ ${destino.tiempo_vuelo_horas} horas</p>
            <p>💰 ${destino.precio_vuelo}€</p>
          </div>
        </div>
      `;

      if(destino.lat && destino.lng){
        L.marker([destino.lat, destino.lng])
          .addTo(map)
          .bindPopup(`<b>${destino.ciudad}</b>`);
      }
    });

  } catch (error) {
    console.error("Error en recomendador:", error);
    alert("Error al obtener recomendaciones");
  }
}
</script>

</body>
</html>
